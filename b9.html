<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Progress Bar</title>

    <style>
        #container {
            width: 300px;
            height: 30px;
            border: 1px solid black;
        }

        #progress {
            height: 100%;
            width: 0%;
            background: rgba(0, 0, 255, 0.2);
            text-align: center;
            color: white;
        }
    </style>

</head>

<body>

    <h3>Progress Bar</h3>

    <div id="container">
        <div id="progress">0%</div>
    </div>

    <br>

    <button onclick="increase()">Tăng tiến trình</button>
    <button onclick="decrease()">Giảm tiến trình</button>

    <script src="./b9.js"></script>

</body>

</html>
